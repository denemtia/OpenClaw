pipeline:
  chunk_duration_sec: 3600
  frame_interval_sec: 0.5
  skip_after_sec: 60
  clip_offset_pre: 30
  clip_total_len: 60
  max_workers: 4

detection:
  keyword: "탈락"
  ocr_lang: "kor+eng"
  ocr_psm: 7

roi:
  x_start: 0.25
  x_end: 0.75
  y_start: 0.55
  y_end: 0.90

ocr_preprocess:
  upscale_factor: 3
  denoise_h: 15
  use_adaptive_threshold: true

thumbnails:
  enabled: true
  width: 320
  quality: 90
